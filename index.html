<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container">
    <h1>Entrar</h1>

    <form id="form-login">
      <label for="email">E-mail</label>
      <input id="email" type="email" required autocomplete="email" />

      <label for="senha">Senha</label>
      <input id="senha" type="password" required autocomplete="current-password" />

      <button type="submit">Entrar</button>
    </form>

    <p id="erro" class="erro" aria-live="polite"></p>
  </div>

  <script type="module">
    import { getSession, signIn } from '/js/auth.js'

    // Verifica o hash ANTES do Supabase processá-lo
    // Links de invite e recovery devem ir para definir-senha.html
    const hashParams = new URLSearchParams(window.location.hash.slice(1))
    if (['recovery', 'invite'].includes(hashParams.get('type'))) {
      window.location.replace('/definir-senha.html' + window.location.hash)
    }

    // Se já está logado, vai direto pra área de membros
    const session = await getSession()
    if (session) {
      window.location.href = '/treinamento.html'
    }

    const form = document.getElementById('form-login')
    const erro = document.getElementById('erro')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      erro.textContent = ''

      const btn = form.querySelector('button')
      btn.disabled = true
      btn.textContent = 'Entrando...'

      const email = document.getElementById('email').value
      const senha = document.getElementById('senha').value

      const { error } = await signIn(email, senha)

      if (error) {
        erro.textContent = 'E-mail ou senha inválidos.'
        btn.disabled = false
        btn.textContent = 'Entrar'
        return
      }

      window.location.href = '/treinamento.html'
    })
  </script>
</body>
</html>
